services:
  postgres:
    image: postgres:16-alpine
    container_name: fastapi_rbac_postgres
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_rbac_api
    env_file:
      - ./.env
    environment:
      # Override POSTGRES_HOST from .env (which is "localhost" for running the
      # app directly on the host) with the compose service name. config.py /
      # alembic build DATABASE_URL from POSTGRES_*, so the api now connects to
      # the postgres container instead of to itself.
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  ui:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: fastapi_rbac_ui
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-8088}:80"
    restart: unless-stopped

volumes:
  postgres_data:
  
