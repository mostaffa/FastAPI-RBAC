# =====================================================================
# Main nginx configuration (replaces /etc/nginx/nginx.conf).
#
# This file MUST live in the main context — it sets directives like
# worker_processes / events / http that are illegal inside conf.d/*.conf
# (which the stock image includes from within its own http{} block).
# The server{} block lives in conf.d/default.conf and is pulled in by
# the `include` at the bottom of http{}.
# =====================================================================

# Brotli dynamic modules, compiled in the Dockerfile build stage against
# the pinned nginx version. Must load in the main context, before events{}.
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;

worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid       /run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    # --- MIME TYPES (critical: without this, JS/CSS are served as
    #     application/octet-stream and the browser refuses to run them) ---
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- LOGGING ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # --- FILE TRANSFER OPTIMIZATION ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;
    types_hash_max_size 2048;

    # --- STATIC FILE PERFORMANCE: cache open file descriptors / metadata ---
    open_file_cache          max=10000 inactive=60s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # --- RATE LIMITING ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # --- COMPRESSION ---
    # Serve the .br / .gz files Vite pre-generates (brotli q11 / gzip 9)
    # with zero runtime CPU. text/html is always handled implicitly and
    # must NOT be listed in *_types.
    brotli_static on;
    gzip_static   on;

    # Runtime fallback for content that isn't pre-compressed (e.g. proxied
    # /api JSON responses).
    brotli              on;
    brotli_comp_level   6;
    brotli_types        application/json application/javascript
                        application/xml+rss application/atom+xml
                        application/manifest+json image/svg+xml
                        text/css text/plain text/javascript;

    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_types      application/json application/javascript
                    application/xml+rss application/atom+xml
                    application/manifest+json image/svg+xml
                    text/css text/plain text/javascript;

    include /etc/nginx/conf.d/*.conf;
}
