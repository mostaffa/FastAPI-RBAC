server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- SECURITY HEADERS ---
    # Optimize privacy and prevent clickjacking/sniffing attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    # Enable gzip_static module to serve pre-compressed .gz files
    gzip_static on;
    # Enable brotli_static to serve pre-compressed .br files
    # Requires ngx_brotli module: https://github.com/google/ngx_brotli
    #brotli_static on;
    
    # Fallback to dynamic compression if static file not found
    gzip on;
    # gzip_comp_level 6;
    gzip_comp_level 5; # Level 5 is the sweet spot (Level 6 uses more CPU for ~1% gain)
    gzip_vary on; # Tells proxies to cache both gzipped and regular versions
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    

    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        # Performance tuning for proxy
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- STATIC ASSET CACHING ---
    # Cache media and fonts aggressively (1 year) since they rarely change
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }

    # Cache CSS and JS files (1 year) - Assumes your bundler (Vite/Webpack) uses hashes in filenames
    location ~* \.(?:css|js)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        # Do not cache index.html so users always get the latest version of your app
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
