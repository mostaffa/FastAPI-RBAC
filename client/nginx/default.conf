# =====================================================================
# Server block for the SPA. Included from http{} in nginx.conf, so only
# http-context directives (server{}, location{}) are valid here.
# =====================================================================

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Note on add_header inheritance: nginx DROPS all inherited add_header
    # directives inside any location that defines its own. So security
    # headers are set on the HTML document (location /) where they matter,
    # and X-Content-Type-Options is repeated on static assets. Proxy
    # locations intentionally set no cache headers so the backend decides.

    # --- API PROXY ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://api:4000;
        proxy_http_version 1.1;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WEBSOCKET PROXY ---
    # Long read/send timeouts so idle sockets aren't killed at 60s.
    location /ws/ {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    3600s;
        proxy_read_timeout    3600s;
    }

    # --- HASHED, IMMUTABLE BUILD ASSETS: cache for a year ---
    # Vite fingerprints these filenames, so they can be cached forever.
    # Single Cache-Control header (no `expires`) to avoid a duplicate.
    location ~* \.(?:js|mjs|css|woff2?|ttf|otf|eot|png|jpe?g|gif|ico|svg|webp|avif|mp4|webm|ogg|wasm)$ {
        access_log off;
        add_header Cache-Control "public, immutable, max-age=31536000";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- SPA ENTRYPOINT ---
    # Never cache the HTML shell, and apply security headers to the document.
    location / {
        try_files $uri $uri/ /index.html;

        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    }
}
