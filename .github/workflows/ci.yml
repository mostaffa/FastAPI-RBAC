name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------- #
  # Backend
  # ----------------------------------------------------------------------- #
  backend-build:
    name: Build backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # matches the production Dockerfile
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install runtime dependencies
        run: pip install -r requirements.txt
      - name: Compile sources
        run: python -m compileall app
      - name: Import smoke test
        run: python -c "import app.main"

  backend-test:
    name: Test backend
    runs-on: ubuntu-latest
    needs: backend-build
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install runtime + dev dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run pytest
        run: pytest

  # ----------------------------------------------------------------------- #
  # Frontend (React + Vite + TypeScript)
  # ----------------------------------------------------------------------- #
  frontend-build:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Build (tsc + vite)
        run: npm run build

  frontend-lint:
    name: Lint frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-format-check:
    name: Format check frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run format:check

  frontend-test:
    name: Test frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run test

  # ----------------------------------------------------------------------- #
  # Docker — build-only (no push). Catches Dockerfile breakage that the unit
  # tests never would. Gated behind the matching test job so we don't waste
  # minutes building an image for code that already failed its tests.
  #
  # GitHub Actions layer caching (type=gha) keeps rebuilds fast — important for
  # the frontend image, which compiles nginx + ngx_brotli from source.
  #
  # To publish images later: add `permissions: { packages: write }`, a
  # docker/login-action step against ghcr.io, set `push: true` and add `tags:`
  # — ideally guarded with `if: github.ref == 'refs/heads/main'`.
  # ----------------------------------------------------------------------- #
  docker-build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: fastapi-rbac-api:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  docker-build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          load: true
          tags: fastapi-rbac-ui:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
